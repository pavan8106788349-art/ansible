- name: install packages
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: install package
      ansible.builtin.package:
        name: "{{ item.name }}"
        state: "{{ item.state }}"
      loop: # list of map  
      loop:
        - { name:"mysql", state:absent } # map/dict
        - { name:"mysql", state:present }
        - { name:"mysql", state:present }